<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souvenir - Travel Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=DM+Sans:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Special+Elite&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="app-shell">
        <header class="topbar">
            <a class="brand" href="#" aria-label="Souvenir">
                <span class="brand-mark">S</span>
                <span>Souvenir</span>
            </a>
            <div class="topbar-actions">
                <button class="ghost-button" id="newPageButton" type="button">Nuova pagina</button>
                <button class="primary-button" id="exportButton" type="button">Esporta PNG</button>
            </div>
        </header>

        <section class="studio">
            <aside class="panel trips-panel" aria-label="Viaggi">
                <div class="section-kicker">Diari</div>
                <div class="trip-list" id="tripList"></div>
            </aside>

            <section class="desk" aria-label="Diario aperto">
                <div class="desk-items" aria-hidden="true">
                    <div class="loose-ticket">BOARDING<br>PASS</div>
                    <div class="film-strip"></div>
                    <div class="pencil"></div>
                </div>

                <div class="book" id="book">
                    <div class="book-spine"></div>
                    <article class="page page-left" id="leftPage" aria-label="Pagina sinistra"></article>
                    <article class="page page-right current" id="rightPage" aria-label="Pagina destra"></article>
                </div>

                <nav class="page-strip" id="pageStrip" aria-label="Pagine del viaggio"></nav>
            </section>

            <aside class="panel tools-panel" aria-label="Atelier">
                <div class="trip-heading">
                    <span class="section-kicker">Viaggio</span>
                    <h1 id="tripTitle">Tokyo summer scraps</h1>
                    <p id="tripMeta">29 Jun - 02 Jul · Japan</p>
                </div>

                <div class="tool-block">
                    <div class="tool-title">Pagina</div>
                    <div class="segmented" aria-label="Pagina attiva">
                        <button class="active" id="selectRight" type="button">Destra</button>
                        <button id="selectLeft" type="button">Sinistra</button>
                    </div>
                </div>

                <div class="tool-block">
                    <div class="tool-title">Aggiungi</div>
                    <div class="tool-grid">
                        <button type="button" data-add="photo">Foto</button>
                        <button type="button" data-add="receipt">Scontrino</button>
                        <button type="button" data-add="ticket">Biglietto</button>
                        <button type="button" data-add="stamp">Timbro</button>
                        <button type="button" data-add="tape">Tape</button>
                        <button type="button" data-add="note">Nota</button>
                    </div>
                </div>

                <div class="tool-block">
                    <div class="tool-title">Stile</div>
                    <div class="swatches" aria-label="Palette">
                        <button class="swatch active" type="button" style="--swatch:#b6241d" data-accent="#b6241d"
                            aria-label="Rosso"></button>
                        <button class="swatch" type="button" style="--swatch:#2d6f86" data-accent="#2d6f86"
                            aria-label="Blu"></button>
                        <button class="swatch" type="button" style="--swatch:#477953" data-accent="#477953"
                            aria-label="Verde"></button>
                        <button class="swatch" type="button" style="--swatch:#b66f91" data-accent="#b66f91"
                            aria-label="Rosa"></button>
                    </div>
                </div>

                <div class="tool-block sliders">
                    <label for="ageRange">Carta vissuta</label>
                    <input id="ageRange" type="range" min="20" max="100" value="72">
                    <label for="shadowRange">Profondità collage</label>
                    <input id="shadowRange" type="range" min="20" max="100" value="70">
                </div>

                <label class="file-import">
                    <input id="photoInput" type="file" accept="image/*">
                    <span>Importa foto</span>
                </label>
            </aside>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        const trips = [
            {
                id: "tokyo",
                title: "Tokyo summer scraps",
                meta: "29 Jun - 02 Jul · Japan",
                accent: "#b6241d",
                cover: "journal-tokyo.jpg",
                pages: [
                    {
                        title: "Ueno after dark",
                        elements: [
                            { type: "receipt", x: 9, y: 9, r: -3, w: 28, text: ["JR PASS", "TOKYO", "Platform 07", "¥ 6100"] },
                            { type: "photo", x: 34, y: 12, r: 2, w: 42, src: "journal-tokyo.jpg" },
                            { type: "ticket", x: 56, y: 8, r: 5, w: 34, text: ["No. 2640", "Ueno Museum", "admit one"] },
                            { type: "stamp", x: 57, y: 48, r: -8, w: 30, text: "TOKYO" },
                            { type: "stampbox", x: 12, y: 60, r: 6, w: 22, text: "JPN 06.29" },
                            { type: "note", x: 11, y: 76, r: -2, w: 58, text: "ramen alle 23:00, luci ovunque, una ricevuta salvata come prova." },
                            { type: "letters", x: 64, y: 82, r: 3, w: 27, text: "tokyo" },
                            { type: "tape", x: 28, y: 16, r: -6, w: 22, color: "#b6241d" }
                        ]
                    },
                    {
                        title: "Museum morning",
                        elements: [
                            { type: "photo", x: 12, y: 10, r: -2, w: 55, src: "journal-japan.jpg" },
                            { type: "receipt", x: 63, y: 14, r: 2, w: 25, text: ["TOKYO", "MUSEUM", "2 tickets", "¥1000"] },
                            { type: "stamp", x: 38, y: 54, r: 4, w: 36, text: "MUSEUM" },
                            { type: "note", x: 15, y: 72, r: 1, w: 67, text: "matcha, mochi, biglietti piegati in tasca e quel rosso bellissimo ovunque." },
                            { type: "tape", x: 48, y: 8, r: 4, w: 24, color: "#d24a42" },
                            { type: "ticket", x: 9, y: 58, r: -4, w: 28, text: ["7th", "anniversary", "stamp"] }
                        ]
                    }
                ]
            },
            {
                id: "california",
                title: "San Diego map days",
                meta: "03 Oct - 08 Oct · California",
                accent: "#2d6f86",
                cover: "journal-map.jpg",
                pages: [
                    {
                        title: "Pick your destination",
                        elements: [
                            { type: "map", x: 7, y: 8, r: -2, w: 58, src: "journal-map.jpg" },
                            { type: "photo", x: 55, y: 45, r: 3, w: 35, src: "journal-map.jpg" },
                            { type: "ticket", x: 58, y: 12, r: -4, w: 29, text: ["SAN ISIDRO", "DOWNTOWN", "LA JOLLA"] },
                            { type: "stamp", x: 43, y: 31, r: 5, w: 34, text: "CALIF." },
                            { type: "note", x: 14, y: 76, r: -2, w: 70, text: "strade segnate a penna, market bag, sole addosso e una foto storta." },
                            { type: "tape", x: 52, y: 40, r: -5, w: 26, color: "#2d6f86" }
                        ]
                    },
                    {
                        title: "Whole foods receipt",
                        elements: [
                            { type: "receipt", x: 15, y: 8, r: -2, w: 32, text: ["WHOLE", "FOODS", "tea", "$8.42"] },
                            { type: "photo", x: 38, y: 18, r: 2, w: 43, src: "journal-map.jpg" },
                            { type: "stampbox", x: 14, y: 55, r: 6, w: 25, text: "SD OCT 2025" },
                            { type: "note", x: 18, y: 70, r: -1, w: 62, text: "la pagina sa di receipt paper, mappa piegata male e risate in macchina." },
                            { type: "letters", x: 55, y: 63, r: 4, w: 30, text: "road" }
                        ]
                    }
                ]
            }
        ];

        const state = {
            tripIndex: 0,
            pageIndex: 0,
            activeSide: "right",
            accent: trips[0].accent,
            importedPhoto: null
        };

        const tripList = document.getElementById("tripList");
        const pageStrip = document.getElementById("pageStrip");
        const leftPage = document.getElementById("leftPage");
        const rightPage = document.getElementById("rightPage");
        const tripTitle = document.getElementById("tripTitle");
        const tripMeta = document.getElementById("tripMeta");
        const toast = document.getElementById("toast");

        function currentTrip() {
            return trips[state.tripIndex];
        }

        function currentPageData(offset = 0) {
            const pages = currentTrip().pages;
            return pages[(state.pageIndex + offset + pages.length) % pages.length];
        }

        function renderTrips() {
            tripList.innerHTML = trips.map((trip, index) => `
                <button class="trip-card ${index === state.tripIndex ? "active" : ""}" type="button" data-trip="${index}">
                    <img src="${trip.cover}" alt="">
                    <span>
                        <strong>${trip.title}</strong>
                        <small>${trip.meta}</small>
                    </span>
                </button>
            `).join("");

            tripList.querySelectorAll("button").forEach((button) => {
                button.addEventListener("click", () => {
                    state.tripIndex = Number(button.dataset.trip);
                    state.pageIndex = 0;
                    state.accent = currentTrip().accent;
                    render();
                });
            });
        }

        function renderPageStrip() {
            pageStrip.innerHTML = currentTrip().pages.map((page, index) => `
                <button class="${index === state.pageIndex ? "active" : ""}" type="button" data-page="${index}">
                    <span>${String(index + 1).padStart(2, "0")}</span>
                    <strong>${page.title}</strong>
                </button>
            `).join("");

            pageStrip.querySelectorAll("button").forEach((button) => {
                button.addEventListener("click", () => {
                    state.pageIndex = Number(button.dataset.page);
                    render();
                });
            });
        }

        function elementHtml(item, index) {
            const style = `left:${item.x}%;top:${item.y}%;width:${item.w}%;--r:${item.r || 0}deg;${item.color ? `--tape:${item.color};` : ""}`;
            const draggable = `data-item="${index}" style="${style}"`;

            if (item.type === "photo" || item.type === "map") {
                return `<figure class="scrap ${item.type}" ${draggable}><img src="${item.src}" alt=""></figure>`;
            }

            if (item.type === "receipt") {
                return `<div class="scrap receipt" ${draggable}>${item.text.map((line, i) => i === 1 ? `<strong>${line}</strong>` : `<span>${line}</span>`).join("")}</div>`;
            }

            if (item.type === "ticket") {
                return `<div class="scrap ticket" ${draggable}>${item.text.map((line, i) => i === 1 ? `<strong>${line}</strong>` : `<span>${line}</span>`).join("")}</div>`;
            }

            if (item.type === "stamp") {
                return `<div class="scrap stamp" ${draggable}>${item.text}</div>`;
            }

            if (item.type === "stampbox") {
                return `<div class="scrap stampbox" ${draggable}>${item.text}</div>`;
            }

            if (item.type === "letters") {
                return `<div class="scrap letters" ${draggable}>${item.text.split("").map((letter) => `<span>${letter}</span>`).join("")}</div>`;
            }

            if (item.type === "tape") {
                return `<div class="scrap tape" ${draggable}></div>`;
            }

            return `<p class="scrap note" ${draggable}>${item.text}</p>`;
        }

        function renderSinglePage(target, page, side) {
            target.className = `page page-${side} ${state.activeSide === side ? "current" : ""}`;
            target.style.setProperty("--accent", state.accent);
            target.innerHTML = `
                <div class="paper-grain"></div>
                <header class="page-date">
                    <span>${page.title}</span>
                    <span>${currentTrip().meta.split("·")[0].trim()}</span>
                </header>
                ${page.elements.map(elementHtml).join("")}
            `;
            makeDraggable(target, side);
        }

        function render() {
            const trip = currentTrip();
            tripTitle.textContent = trip.title;
            tripMeta.textContent = trip.meta;
            document.documentElement.style.setProperty("--accent", state.accent);
            renderTrips();
            renderPageStrip();
            renderSinglePage(leftPage, currentPageData(1), "left");
            renderSinglePage(rightPage, currentPageData(0), "right");
            document.querySelectorAll(".swatch").forEach((button) => {
                button.classList.toggle("active", button.dataset.accent === state.accent);
            });
            document.getElementById("selectRight").classList.toggle("active", state.activeSide === "right");
            document.getElementById("selectLeft").classList.toggle("active", state.activeSide === "left");
        }

        function activePageData() {
            return state.activeSide === "right" ? currentPageData(0) : currentPageData(1);
        }

        function addItem(type) {
            const page = activePageData();
            const base = { x: 42, y: 34, r: Math.round(Math.random() * 8 - 4), w: 28 };
            const image = state.importedPhoto || currentTrip().cover;
            const items = {
                photo: { ...base, type: "photo", w: 34, src: image },
                receipt: { ...base, type: "receipt", w: 25, text: ["CAFE", "RECEIPT", "table 04", "€ 12.80"] },
                ticket: { ...base, type: "ticket", w: 31, text: ["No. 108", "DAY PASS", "valid today"] },
                stamp: { ...base, type: "stamp", w: 28, text: "STAMP" },
                tape: { ...base, type: "tape", w: 24, color: state.accent },
                note: { ...base, type: "note", w: 48, text: "scrivi qui quel dettaglio minuscolo che vuoi ricordare." }
            };
            page.elements.push(items[type]);
            render();
            showToast("Elemento aggiunto");
        }

        function makeDraggable(pageEl, side) {
            pageEl.querySelectorAll(".scrap").forEach((node) => {
                node.addEventListener("pointerdown", (event) => {
                    const itemIndex = Number(node.dataset.item);
                    const data = side === "right" ? currentPageData(0) : currentPageData(1);
                    const item = data.elements[itemIndex];
                    const rect = pageEl.getBoundingClientRect();
                    const startX = event.clientX;
                    const startY = event.clientY;
                    const originX = item.x;
                    const originY = item.y;
                    node.setPointerCapture(event.pointerId);
                    node.classList.add("dragging");

                    function move(moveEvent) {
                        item.x = Math.max(1, Math.min(88, originX + ((moveEvent.clientX - startX) / rect.width) * 100));
                        item.y = Math.max(1, Math.min(88, originY + ((moveEvent.clientY - startY) / rect.height) * 100));
                        node.style.left = `${item.x}%`;
                        node.style.top = `${item.y}%`;
                    }

                    function up() {
                        node.classList.remove("dragging");
                        node.removeEventListener("pointermove", move);
                        node.removeEventListener("pointerup", up);
                    }

                    node.addEventListener("pointermove", move);
                    node.addEventListener("pointerup", up);
                });
            });
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add("show");
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
        }

        function loadCanvasImage(src) {
            return new Promise((resolve) => {
                const image = new Image();
                image.crossOrigin = "anonymous";
                image.onload = () => resolve(image);
                image.onerror = () => resolve(null);
                image.src = src;
            });
        }

        function drawWrappedText(context, text, x, y, maxWidth, lineHeight) {
            const words = text.split(" ");
            let line = "";
            words.forEach((word) => {
                const testLine = `${line}${word} `;
                if (context.measureText(testLine).width > maxWidth && line) {
                    context.fillText(line.trim(), x, y);
                    line = `${word} `;
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            });
            context.fillText(line.trim(), x, y);
        }

        async function exportCurrentPage() {
            const data = activePageData();
            const canvas = document.createElement("canvas");
            canvas.width = 1600;
            canvas.height = 2200;
            const context = canvas.getContext("2d");
            const pageWidth = canvas.width;
            const pageHeight = canvas.height;

            context.fillStyle = "#f4ead4";
            context.fillRect(0, 0, pageWidth, pageHeight);
            context.strokeStyle = "rgba(84, 65, 47, 0.16)";
            context.lineWidth = 2;
            for (let x = 0; x < pageWidth; x += 54) {
                context.beginPath();
                context.moveTo(x, 0);
                context.lineTo(x, pageHeight);
                context.stroke();
            }
            for (let y = 0; y < pageHeight; y += 54) {
                context.beginPath();
                context.moveTo(0, y);
                context.lineTo(pageWidth, y);
                context.stroke();
            }

            context.fillStyle = "rgba(117, 91, 63, 0.07)";
            for (let i = 0; i < 900; i += 1) {
                context.fillRect(Math.random() * pageWidth, Math.random() * pageHeight, 2, 2);
            }

            context.fillStyle = "#675846";
            context.font = "34px Special Elite, monospace";
            context.fillText(data.title, 70, 92);
            context.fillText(currentTrip().meta.split("·")[0].trim(), pageWidth - 390, 92);

            for (const item of data.elements) {
                const x = (item.x / 100) * pageWidth;
                const y = (item.y / 100) * pageHeight;
                const w = (item.w / 100) * pageWidth;
                const rotation = ((item.r || 0) * Math.PI) / 180;
                context.save();
                context.translate(x, y);
                context.rotate(rotation);

                if (item.type === "photo" || item.type === "map") {
                    const image = await loadCanvasImage(item.src);
                    const h = item.type === "map" ? w * 1.18 : w * 1.28;
                    context.shadowColor = "rgba(49, 36, 25, 0.28)";
                    context.shadowBlur = 24;
                    context.shadowOffsetY = 18;
                    context.fillStyle = "#fffdf6";
                    context.fillRect(0, 0, w, h);
                    context.shadowColor = "transparent";
                    if (image) {
                        const pad = 26;
                        const imageHeight = h - 92;
                        context.drawImage(image, pad, pad, w - pad * 2, imageHeight);
                    }
                } else if (item.type === "receipt" || item.type === "ticket") {
                    const h = w * 1.75;
                    context.shadowColor = "rgba(49, 36, 25, 0.20)";
                    context.shadowBlur = 20;
                    context.shadowOffsetY = 14;
                    context.fillStyle = item.type === "receipt" ? "#f9f5eb" : "#dce4dc";
                    context.fillRect(0, 0, w, h);
                    context.shadowColor = "transparent";
                    context.fillStyle = "#28241f";
                    context.font = "32px Special Elite, monospace";
                    item.text.forEach((line, index) => {
                        context.fillStyle = index === 1 ? state.accent : "#28241f";
                        context.font = index === 1 ? "42px Special Elite, monospace" : "32px Special Elite, monospace";
                        context.fillText(line, 28, 48 + index * 58);
                    });
                } else if (item.type === "stamp" || item.type === "stampbox") {
                    const h = item.type === "stamp" ? w * 0.6 : w * 0.78;
                    context.strokeStyle = state.accent;
                    context.fillStyle = state.accent;
                    context.lineWidth = 8;
                    context.font = "700 54px Fraunces, serif";
                    context.textAlign = "center";
                    if (item.type === "stamp") {
                        context.beginPath();
                        context.ellipse(w / 2, h / 2, w / 2, h / 2, 0, 0, Math.PI * 2);
                        context.stroke();
                    } else {
                        context.strokeRect(0, 0, w, h);
                    }
                    context.fillText(item.text, w / 2, h / 2 + 18);
                    context.textAlign = "left";
                } else if (item.type === "letters") {
                    const letters = item.text.split("");
                    letters.forEach((letter, index) => {
                        context.fillStyle = index % 2 ? state.accent : "#29352b";
                        context.fillRect(index * 58, index % 2 ? -16 : 0, 48, 62);
                        context.fillStyle = "#f4ead4";
                        context.font = "700 40px Fraunces, serif";
                        context.fillText(letter, index * 58 + 14, index % 2 ? 30 : 46);
                    });
                } else if (item.type === "tape") {
                    context.fillStyle = item.color || state.accent;
                    context.globalAlpha = 0.72;
                    context.fillRect(0, 0, w, 42);
                    context.globalAlpha = 1;
                } else {
                    context.fillStyle = "#29231d";
                    context.font = "64px Caveat, cursive";
                    drawWrappedText(context, item.text, 0, 52, w, 62);
                }

                context.restore();
            }

            const link = document.createElement("a");
            link.download = `${currentTrip().title.toLowerCase().replaceAll(" ", "-")}-page-${state.pageIndex + 1}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            showToast("PNG esportato");
        }

        document.querySelectorAll("[data-add]").forEach((button) => {
            button.addEventListener("click", () => addItem(button.dataset.add));
        });

        document.querySelectorAll(".swatch").forEach((button) => {
            button.addEventListener("click", () => {
                state.accent = button.dataset.accent;
                render();
            });
        });

        document.getElementById("selectRight").addEventListener("click", () => {
            state.activeSide = "right";
            render();
        });

        document.getElementById("selectLeft").addEventListener("click", () => {
            state.activeSide = "left";
            render();
        });

        document.getElementById("newPageButton").addEventListener("click", () => {
            currentTrip().pages.push({
                title: `Page ${currentTrip().pages.length + 1}`,
                elements: [
                    { type: "photo", x: 18, y: 14, r: -2, w: 44, src: state.importedPhoto || currentTrip().cover },
                    { type: "note", x: 18, y: 68, r: 1, w: 58, text: "nuova pagina, nuovo pezzo di viaggio." },
                    { type: "tape", x: 42, y: 11, r: 3, w: 22, color: state.accent }
                ]
            });
            state.pageIndex = currentTrip().pages.length - 1;
            render();
            showToast("Pagina creata");
        });

        document.getElementById("exportButton").addEventListener("click", exportCurrentPage);

        document.getElementById("photoInput").addEventListener("change", (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                state.importedPhoto = reader.result;
                addItem("photo");
            };
            reader.readAsDataURL(file);
        });

        document.getElementById("ageRange").addEventListener("input", (event) => {
            document.documentElement.style.setProperty("--age", event.target.value / 100);
        });

        document.getElementById("shadowRange").addEventListener("input", (event) => {
            document.documentElement.style.setProperty("--depth", event.target.value / 100);
        });

        render();
    </script>
</body>

</html>
