<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- sfondo cerchio granata -->
  <circle cx="32" cy="32" r="32" fill="#8e1d22"/>
  <!-- cerchio bordo oro -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#e0a93c" stroke-width="1.5"/>

  <!-- ancora stilizzata in oro -->
  <!-- asta verticale -->
  <line x1="32" y1="14" x2="32" y2="50" stroke="#e0a93c" stroke-width="2.8" stroke-linecap="round"/>
  <!-- traversa orizzontale -->
  <line x1="22" y1="22" x2="42" y2="22" stroke="#e0a93c" stroke-width="2.8" stroke-linecap="round"/>
  <!-- anello in cima -->
  <circle cx="32" cy="14" r="3.5" fill="none" stroke="#e0a93c" stroke-width="2.2"/>
  <!-- arco inferiore -->
  <path d="M22,50 Q32,44 42,50" fill="none" stroke="#e0a93c" stroke-width="2.8" stroke-linecap="round"/>
  <!-- palette sx -->
  <line x1="22" y1="50" x2="17" y2="46" stroke="#e0a93c" stroke-width="2.2" stroke-linecap="round"/>
  <!-- palette dx -->
  <line x1="42" y1="50" x2="47" y2="46" stroke="#e0a93c" stroke-width="2.2" stroke-linecap="round"/>

  <!-- raggi bussola (piccoli) -->
  <g stroke="#e0a93c" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
    <line x1="32" y1="6" x2="32" y2="10"/>
    <line x1="32" y1="54" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="10" y2="32"/>
    <line x1="54" y1="32" x2="58" y2="32"/>
    <line x1="13" y1="13" x2="16" y2="16"/>
    <line x1="51" y1="13" x2="48" y2="16"/>
    <line x1="13" y1="51" x2="16" y2="48"/>
    <line x1="51" y1="51" x2="48" y2="48"/>
  </g>
</svg>
