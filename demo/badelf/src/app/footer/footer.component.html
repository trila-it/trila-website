<footer class="ft">
  <div class="ft__wrap">

    <div class="ft__top">

        <p class="ft__tagline">Craft beer, buona musica e cibo vero.<br/>Nel cuore del Quartiere Venezia, Livorno.</p>
      </div>

      <nav class="ft__nav">
        <span class="ft__nav-label">Naviga</span>
        <a routerLink="/" class="ft__nav-link">Home</a>
        <a routerLink="/menu" class="ft__nav-link">Menu</a>
        <a routerLink="/eventi" class="ft__nav-link">Eventi</a>
        <a routerLink="/foto" class="ft__nav-link">Foto</a>
        <a routerLink="/contattaci" class="ft__nav-link">Contattaci</a>

      <div class="ft__contacts">
        <span class="ft__nav-label">Dove siamo</span>
        <p class="ft__addr">Scali delle Ancore 1d<br/>Quartiere Venezia, Livorno</p>
        <a href="tel:+393518456007" class="ft__contact-link">351 845 6007</a>
        <a href="mailto:info@badelfpub.it" class="ft__contact-link">info&#64;badelfpub.it</a>
      </div>

      <div class="ft__social">
        <span class="ft__nav-label">Seguici</span>
        <div class="ft__social-links">
          <a href="#" class="ft__social-icon" aria-label="Instagram">
